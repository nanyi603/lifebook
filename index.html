<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>男一NB</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#0d0d0d;color:#ccc;min-height:100vh;padding:20px}
.container{max-width:780px;margin:0 auto}
h1{text-align:center;margin-bottom:4px;font-size:28px;color:#c62828;letter-spacing:8px}
.subtitle{text-align:center;color:#555;margin-bottom:16px;font-size:12px}
.stats{text-align:center;margin-bottom:16px;font-size:13px;color:#888}
.stats span{margin:0 10px}
.row{display:flex;align-items:center;gap:8px;padding:8px 10px;margin-bottom:3px;background:#111;border-radius:6px;border:1px solid #1a1a1a;font-size:13px}
.row.risk{border-color:#4a0000;background:#1a0505}
.num{color:#444;font-size:11px;width:20px;text-align:center;flex-shrink:0}.num.risk-num{color:#4caf50;cursor:pointer}
.name-input{flex:1;padding:6px 8px;border:1px solid #222;border-radius:4px;background:#0a0a0a;color:#ccc;font-size:13px;outline:none}
.name-input:focus{border-color:#c62828}
.timer{color:#ff5252;font-size:12px;min-width:104px;text-align:center;font-family:'Consolas',monospace}
.tag-group{display:flex;gap:2px;flex-shrink:0}
.tag{padding:5px 10px;border:1px solid #222;background:#0a0a0a;color:#555;cursor:pointer;font-size:12px;border-radius:0;white-space:nowrap;user-select:none}
.tag:first-child{border-radius:4px 0 0 4px}
.tag:last-child{border-radius:0 4px 4px 0}
.tag.login.active{background:#1b5e20;border-color:#388e3c;color:#a5d6a7}
.tag.kicked.active{background:#b71c1c;border-color:#e53935;color:#ef9a9a}
.tag.risk.active{background:#e65100;border-color:#ff6d00;color:#ffcc80}
.tag:hover:not(.active){border-color:#444;color:#999}
.btn-row{display:flex;gap:10px;justify-content:center;margin-top:20px}
.btn{padding:8px 20px;border:1px solid #333;border-radius:4px;cursor:pointer;font-size:13px;background:#1a1a1a;color:#aaa}
.btn:hover{border-color:#555;color:#fff}
.msg{text-align:center;margin-top:10px;font-size:13px;color:#4caf50;opacity:0;transition:opacity .3s}
.msg.show{opacity:1}
.toggle-detail{transition:transform .2s;color:#555;font-size:13px;cursor:pointer;flex-shrink:0;width:16px;text-align:center;user-select:none}
.toggle-detail:hover{color:#ccc}
.toggle-detail.open{color:#81c784;transform:rotate(180deg)}
.name-group{flex:1;display:flex;flex-direction:column;gap:3px}
.detail-row{display:none;gap:4px}
.detail-row.show{display:flex}
.detail-input{flex:1;padding:4px 6px;border:1px solid #222;border-radius:3px;background:#0a0a0a;color:#aaa;font-size:11px;outline:none;width:50%}
.detail-input:focus{border-color:#c62828}
.tag.encrypted.active{background:#1a237e;border-color:#3f51b5;color:#9fa8da}
</style>
</head>
<body>
<div class="container">
<h1>男一NB</h1>
<p class="subtitle">登 / 顶 / 高 / 加密 — 七天倒计时</p>
<div class="stats">
  <span style="color:#81c784">登录 <strong id="login-count">0</strong></span>
  <span style="color:#ef5350">被顶 <strong id="kick-count">0</strong></span>
  <span style="color:#ff9800">高风险 <strong id="risk-count">0</strong></span>
  <span style="color:#666">未标记 <strong id="none-count">40</strong></span>
</div>
<div id="list"></div>
<div class="btn-row">
  <button class="btn" onclick="save()">保存</button>
  <button class="btn" onclick="exportData()">导出</button>
  <button class="btn" onclick="importData()">导入</button>
	  <button class="btn" onclick="resetAll()">清空</button>
</div>
<p class="msg" id="msg">已保存</p>
</div>
<script>
var T=40,D=[];
try{D=JSON.parse(localStorage.getItem("lb")||"[]")}catch(e){D=[]}
for(var _i=0;_i<D.length;_i++){if(D[_i]&&D[_i].v!==undefined){var _d=D[_i];_d.login=(_d.v==="login");_d.kicked=(_d.v==="kicked");_d.risk=(_d.v==="risk");if(!_d.risk){_d.t=0;_d.hrs=0}delete _d.v}}
function esc(s){return s.replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function migrate(d){
  if(!d||d.v===undefined)return;
  d.login=(d.v==="login");d.kicked=(d.v==="kicked");d.risk=(d.v==="risk");
  if(!d.risk){d.t=0;d.hrs=0}
  delete d.v
}
function build(){
  var l=document.getElementById("list"),h="";
  for(var i=0;i<T;i++){
    var d=D[i]||{};
    migrate(d);
    var rc="row";
    if(d.risk)rc+=" risk";
    h+="<div class='"+rc+"' id='rw-"+i+"'>";
    var nc='num';if(d.risk)nc+=' risk-num';
    h+="<span class='"+nc+"' id='num-"+i+"'>"+(i+1)+"</span>";
    h+="<span class='toggle-detail"+(d.showDetail?" open":"")+"' id='tg-"+i+"'>▼</span>";
    h+="<div class='name-group'>";
    h+="<input class='name-input' id='nm-"+i+"' placeholder='人名' value='"+esc(d.n||"")+"'>";
    h+="<div class='detail-row"+(d.showDetail?" show":"")+"' id='dr-"+i+"'>";
    h+="<input class='detail-input' id='ac-"+i+"' placeholder='账号' value='"+esc(d.account||"")+"'>";
    h+="<input class='detail-input' id='pw-"+i+"' type='password' placeholder='密码' value='"+esc(d.password||"")+"'>";
    h+="</div></div>";
    h+="<span class='timer' id='tm-"+i+"'></span>";
    h+="<div class='tag-group'>";
    h+="<button class='tag login"+(d.login?" active":"")+"' id='l-"+i+"'>登</button>";
    h+="<button class='tag kicked"+(d.kicked?" active":"")+"' id='k-"+i+"'>顶</button>";
    h+="<button class='tag encrypted"+(d.encrypted?" active":"")+"' id='e-"+i+"'>加密</button>";
    h+="<button class='tag risk"+(d.risk?" active":"")+"' id='r-"+i+"'>高</button>";
    h+="</div></div>";
  }
  l.innerHTML=h;
  for(var i=0;i<T;i++){
    (function(j){
      document.getElementById("l-"+j).onclick=function(){setVal(j,"login")};
      document.getElementById("k-"+j).onclick=function(){setVal(j,"kicked")};
      document.getElementById("e-"+j).onclick=function(){setVal(j,"encrypted")};
      document.getElementById("r-"+j).onclick=function(){setVal(j,"risk")};
      document.getElementById("num-"+j).onclick=function(){resetRisk(j)};
      document.getElementById("tg-"+j).onclick=function(){toggleDetail(j)};
    })(i)
  }
  updateAllTimers()
}
function setVal(i,v){
  if(!D[i])D[i]={n:"",login:false,kicked:false,risk:false,encrypted:false,showDetail:false,t:0,hrs:0,target:0,account:"",password:""};
  var active=(D[i].login?1:0)+(D[i].kicked?1:0)+(D[i].risk?1:0);
  var turningOn=!D[i][v];
  if(turningOn&&active>=2&&v!=="encrypted")return;
  if(v==="encrypted"){D[i].encrypted=!D[i].encrypted}else{
    if(v==="login")D[i].kicked=false;
    if(v==="kicked")D[i].login=false;
    D[i][v]=!D[i][v]
  }
  if(v==="risk"){
    if(D[i].risk){
      var td=new Date();td.setHours(0,0,0,0);
      var wds=["日","一","二","三","四","五","六"];
      var msg="选择到期日期:\n今天 "+(td.getMonth()+1)+"月"+td.getDate()+"日\n\n";
      for(var j=1;j<=7;j++){
        var dt=new Date(td.getTime()+j*86400000);
        msg+=j+". "+(dt.getMonth()+1)+"月"+dt.getDate()+"日 (周"+wds[dt.getDay()]+")\n"
      }
      msg+="\n输入序号 1-7:";
      var c=parseInt(prompt(msg,"7"));
      if(!c||c<1||c>7){D[i].risk=false;build();updateStats();save();return}
      D[i].target=new Date(td.getTime()+c*86400000).getTime();
      var tm=prompt('到期时间 (24小时制，默认23:59)','23:59');
      var parts=tm?tm.split(':'):['23','59'];
      var hh=parseInt(parts[0])||23,mm=parseInt(parts[1])||59;
      if(hh>=0&&hh<24&&mm>=0&&mm<60)D[i].target+=hh*3600000+mm*60000
      D[i].t=Date.now()
    }else{D[i].t=0;D[i].target=0}
  }
  var row=document.getElementById("rw-"+i);
  row.className="row";
  if(D[i].risk)row.className+=" risk";
  document.getElementById("l-"+i).className="tag login"+(D[i].login?" active":"");
  document.getElementById("k-"+i).className="tag kicked"+(D[i].kicked?" active":"");
  document.getElementById("e-"+i).className="tag encrypted"+(D[i].encrypted?" active":"");
  document.getElementById("r-"+i).className="tag risk"+(D[i].risk?" active":"");
  document.getElementById("num-"+i).className=D[i].risk?"num risk-num":"num";
  updateTimer(i);updateStats();save()
}
function updateTimer(i){
  var d=D[i]||{},el=document.getElementById("tm-"+i);
  if(!el)return;
  if(!d.risk||!d.t){el.textContent="";return}
  var tgt=d.target||(d.t+(d.hrs||168)*3600000);var r=tgt-Date.now();
  if(r<=0){el.textContent="已到期";return}
  var days=Math.floor(r/86400000);
  var hrs2=Math.floor((r%86400000)/3600000);
  var min=Math.floor((r%3600000)/60000);
  var sec=Math.floor((r%60000)/1000);
  if(days>0)el.textContent=days+"天 "+p(hrs2)+":"+p(min)+":"+p(sec);
  else el.textContent=p(hrs2)+":"+p(min)+":"+p(sec)
}
function p(n){return n<10?"0"+n:n}
function resetRisk(i){
  if(!D[i]||!D[i].risk)return;
  D[i].risk=false;D[i].t=0;D[i].hrs=0;D[i].target=0;
  document.getElementById("rw-"+i).className="row";
  document.getElementById("e-"+i).className="tag encrypted";
  document.getElementById("r-"+i).className="tag risk";
  document.getElementById("num-"+i).className="num";
  document.getElementById("tm-"+i).textContent="";
  updateStats();save()
}
function toggleDetail(i){
  if(!D[i])D[i]={n:"",login:false,kicked:false,risk:false,encrypted:false,showDetail:false,t:0,hrs:0,target:0,account:"",password:""};
  D[i].showDetail=!D[i].showDetail;
  var dr=document.getElementById("dr-"+i);
  var tg=document.getElementById("tg-"+i);
  if(D[i].showDetail){dr.classList.add("show");tg.classList.add("open")}
  else{dr.classList.remove("show");tg.classList.remove("open")};
  save()
}
function updateAllTimers(){for(var i=0;i<T;i++)updateTimer(i)}
function updateStats(){
  var L=0,K=0,R=0;
  for(var i=0;i<T;i++){
    if(!D[i])continue;
    if(D[i].login)L++;
    if(D[i].kicked)K++;
    if(D[i].risk)R++
  }
  document.getElementById("login-count").textContent=L;
  document.getElementById("kick-count").textContent=K;
  document.getElementById("risk-count").textContent=R;
  document.getElementById("none-count").textContent=T-L-K-R
}
function save(){
  for(var i=0;i<T;i++){
    if(!D[i])D[i]={n:"",login:false,kicked:false,risk:false,encrypted:false,showDetail:false,t:0,hrs:0,target:0,account:"",password:""};
    var el=document.getElementById("nm-"+i);
    if(el)D[i].n=el.value;
    var ac=document.getElementById("ac-"+i);
    if(ac)D[i].account=ac.value;
    var pw=document.getElementById("pw-"+i);
    if(pw)D[i].password=pw.value
  }
  localStorage.setItem("lb",JSON.stringify(D));
  var m=document.getElementById("msg");
  m.classList.add("show");
  setTimeout(function(){m.classList.remove("show")},1500)
}
function exportData(){
  save();
  var txt="=== 男一NB ===\n导出: "+new Date().toLocaleString()+"\n\n";
  for(var i=0;i<T;i++){
    var d=D[i]||{},n=d.n||"(空)",v=[];
    if(d.login)v.push("登");
    if(d.kicked)v.push("顶");
    if(d.encrypted)v.push("加密");
    if(d.risk){
      var s="高风险";
      if(d.t){var tgt2=d.target||(d.t+(d.hrs||168)*3600000);s+=" [到期: "+new Date(tgt2).toLocaleString()+"]"}
      v.push(s)
    }
    if(v.length===0)v.push("-");
    var extra="";
    if(d.account)extra+=" 账号:"+d.account;
    if(d.password)extra+=" 密码:"+d.password;
    txt+=(i+1)+". "+n+" -> "+v.join("+")+extra+"\n"
  }
  var b=new Blob([txt],{type:"text/plain;charset=utf-8"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(b);
  a.download="男一NB_"+new Date().toISOString().slice(0,10)+".txt";
  a.click();
  var j=new Blob([JSON.stringify(D,null,2)],{type:"application/json;charset=utf-8"});
  var a2=document.createElement("a");
  a2.href=URL.createObjectURL(j);
  a2.download="男一NB_"+new Date().toISOString().slice(0,10)+".json";
  a2.click()
}
function importData(){
  var inp=document.createElement("input");
  inp.type="file";inp.accept=".json";
  inp.onchange=function(e){
    var f=e.target.files[0];
    if(!f)return;
    var r=new FileReader();
    r.onload=function(ev){
      try{
        var arr=JSON.parse(ev.target.result);
        if(!Array.isArray(arr)){alert("格式错误");return}
        D=arr;
        localStorage.setItem("lb",JSON.stringify(D));
        build();updateStats();
        document.getElementById("msg").classList.add("show");
        setTimeout(function(){document.getElementById("msg").classList.remove("show")},1500)
      }catch(e){alert("导入失败: "+e.message)}
    };
    r.readAsText(f)
  };
  inp.click()
}
function resetAll(){
  if(!confirm("清空男一NB？"))return;
  D=[];
  localStorage.removeItem("lb");
  build();
  updateStats()
}
build();
updateStats();
setInterval(function(){for(var i=0;i<T;i++){if(D[i]&&D[i].risk&&D[i].t)updateTimer(i)}},1000);
</script>
</body>
</html>
